<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Shield</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      width: 280px;
      min-height: 200px;
      padding: 0;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a2634 0%, #111b27 100%);
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e2d3d;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      font-size: 20px;
      line-height: 1;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: -0.01em;
    }

    .logo-sub {
      font-size: 10px;
      color: #7d8fa1;
      font-weight: 400;
      margin-top: 1px;
    }

    /* Master toggle */
    .master-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #2d3748;
      border-radius: 20px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #7d8fa1;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #238636;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background: #fff;
    }

    /* Content */
    .content {
      padding: 14px 18px;
    }

    /* Section */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #7d8fa1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Option rows */
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #1a2230;
    }

    .option-row:last-child {
      border-bottom: none;
    }

    .option-label {
      font-size: 13px;
      color: #c9d1d9;
      font-weight: 400;
    }

    .option-hint {
      font-size: 10px;
      color: #546878;
      margin-top: 2px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #1a2230;
      margin: 12px 0;
    }

    /* Panic button */
    .panic-row {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 11px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      margin-top: 12px;
    }

    .panic-row:hover {
      background: #1e2740;
      border-color: #3d5070;
    }

    .panic-label {
      font-size: 13px;
      color: #c9d1d9;
      font-weight: 500;
    }

    .panic-hint {
      font-size: 10px;
      color: #7d8fa1;
      margin-top: 2px;
    }

    .shortcut-badge {
      background: #2d3748;
      color: #a0b3c6;
      font-size: 11px;
      font-family: 'DM Mono', 'Fira Code', monospace;
      padding: 3px 8px;
      border-radius: 5px;
      border: 1px solid #3d4f63;
    }

    /* Footer */
    .footer {
      padding: 10px 18px 14px;
      border-top: 1px solid #1a2230;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #238636;
      margin-right: 5px;
      vertical-align: middle;
    }

    .status-dot.off {
      background: #6e7681;
    }

    .status-text {
      font-size: 11px;
      color: #7d8fa1;
    }

    /* Disabled state */
    .content.disabled .option-row,
    .content.disabled .panic-row {
      opacity: 0.38;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <span class="logo-icon">🛡</span>
      <div>
        <div class="logo-text">WhatsApp Shield</div>
        <div class="logo-sub">Screen privacy for WhatsApp Web</div>
      </div>
    </div>
    <label class="toggle" title="Enable / disable shield">
      <input type="checkbox" id="masterToggle" checked />
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="content" id="mainContent">
    <div class="section-label">Blur settings</div>

    <div class="option-row">
      <div>
        <div class="option-label">Stickers</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="blurStickers" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">Images</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="blurImages" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">GIFs</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="blurGifs" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="section-label">Reveal mode</div>

    <div class="option-row">
      <div>
        <div class="option-label">Reveal on hover</div>
        <div class="option-hint">Otherwise, click to reveal</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="revealHover" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="panic-row" id="panicBtn">
      <div>
        <div class="panic-label">⚡ Panic blur</div>
        <div class="panic-hint">Instantly blur entire chat</div>
      </div>
      <span class="shortcut-badge">Shift + H</span>
    </div>
  </div>

  <div class="footer">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Shield active on WhatsApp Web</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
